<!doctype html><html><head><meta charset="utf-8"><style>
  body{width:260px;margin:0;padding:14px;font:13px ui-sans-serif,system-ui;background:#1a1917;color:#f3ebda}
  h1{font:700 14px Georgia,serif;margin:0 0 4px}
  p{margin:0 0 12px;color:#b0a99b;font-size:11px;line-height:1.5}
  label{display:block;font-size:10px;letter-spacing:.4px;text-transform:uppercase;color:#b0a99b;margin:10px 0 4px}
  input{width:100%;box-sizing:border-box;background:#211f1c;border:1px solid rgba(244,239,228,.22);color:#f3ebda;border-radius:8px;padding:8px}
  button{width:100%;margin-top:12px;padding:9px;border:0;border-radius:8px;background:#f3ebda;color:#1a1917;font-weight:700;cursor:pointer}
  .on{background:#5aa873;color:#fff}
  .status{margin-top:8px;font-size:11px;color:#b0a99b;text-align:center}
</style></head><body>
  <h1>Market Bubble · X Bridge</h1>
  <p>Open the X live broadcast in a tab, paste your ingest key, hit Start. Keep the tab open while they're live.</p>
  <label>Hub URL</label>
  <input id="hub" placeholder="https://market-bubble-hub.onrender.com">
  <label>Ingest key</label>
  <input id="key" type="password" placeholder="paste ingest key">
  <button id="toggle">Start</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body></html>
